# Data-characteristic prior coefficients (PRD §6.7).
#
# These are the ~17 coefficients the PRD calls out as "starting values that
# need empirical validation." Living here rather than in code so they can
# be tuned without a code change and so users can override per-domain.
#
# Each entry is a multiplicative adjustment to a signal's Dirichlet
# concentration alpha_k. The baseline is alpha_k = 1.0 for all signals
# (uninformative). After all adjustments, alpha is clipped to [0.5, 100]
# to prevent pathologically sharp or flat priors.
#
# The "why" for each coefficient:
#   - graph_density -> cooccurrence: a dense graph means co-occurrence is a
#     strong signal; we want the prior to reflect that.
#   - clustering_coefficient -> community / graph_topology: high clustering
#     = meaningful communities, so those signals deserve more prior mass.
#   - session_density -> path_full, path_tail: if users have many
#     multi-item sessions, the sequential signals have data to work with.
#   - catalog_to_entity_ratio: severity of cold-start; high ratio =
#     broaden priors across all signals (divide by 2).
#
# All coefficients are placeholders pending Phase 7 tuning against
# MovieLens, Instacart, Amazon, RetailRocket. Updates happen via PR.

[baseline]
alpha = 1.0

[graph_density]
# alpha[cooccurrence] *= (1 + coefficient * density)
target = "cooccurrence"
coefficient = 5.0

[graph_density_cosine]
# Same rationale - denser graphs mean cosine kNN carries stronger signal.
target = "item_item_cosine"
coefficient = 5.0

[graph_density_als]
# ALS also scales with graph density but is less sensitive: it generalizes
# across items that never co-occur, which is exactly what sparse graphs
# need. Smaller coefficient so ALS retains mass on sparse data.
target = "als_factor"
coefficient = 2.0

[clustering_coefficient]
targets = ["community", "graph_topology"]
coefficient = 3.0

[session_density_full]
target = "path_full"
coefficient = 2.0

[session_density_tail]
target = "path_tail"
coefficient = 1.0

[session_density_basket]
target = "path_basket"
coefficient = 0.5

[catalog_to_entity_ratio]
# When ratio > threshold, divide all alphas by shrink_factor (broader prior).
threshold = 10.0
shrink_factor = 2.0

[session_stiffness]
# When the input lacks an explicit session_id column, sessions are
# GMM-inferred from timestamps. On ratings-style data (ML-1M) that
# produces "rapid-fire rating burst" sessions rather than semantic
# baskets, so the path signals carry noise, not structure. Multiply
# path_* priors by `shrink_factor` to let cooccurrence dominate.
shrink_factor = 0.2
targets = ["path_full", "path_tail", "path_basket"]

[persona_baseline]
# Persona signal is opt-in. When the signal isn't fitted, the column
# is all zeros and the blend naturally gives it zero weight. When
# fitted, we start with alpha=1 (uniform prior) and let Phase 7-style
# empirical tuning raise or lower it. PRD supplement §3.2 proposes
# silhouette/noise-fraction-based adjustments; those land once we
# have measured per-dataset behavior.
target = "persona"
alpha = 1.0

[temporal_cooccurrence_baseline]
# Temporal cooccurrence is the direct-lookup version of cooccurrence
# with time-decay-weighted edges. When the substrate's session-presence
# guard detects real session structure (grocery-style: midpoint > 300s),
# the kernel actively helps. When it detects rating-burst data (ml1m-
# style), the kernel falls back to pure-count and the signal becomes a
# near-duplicate of cooccurrence that the VI decorrelator handles.
# Start with the same prior as cooccurrence; empirical tuning pending.
target = "temporal_cooccurrence"
alpha = 2.0

# path_full is zeroed in _compute_signal_features (DEACTIVATED_SIGNALS).
# No prior override needed: a column of zeros + any prior drives the
# posterior mean to ~0 after VI convergence. Keeping the default
# path_full prior avoids breaking existing tests that assert on it.
