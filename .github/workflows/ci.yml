name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev,bench]"
      - run: pytest -v --cov=kindling --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: coverage.xml

  # Regression gate: fail if NDCG@10 drops below the gates.toml baseline.
  # movielens-1m only (CI-feasible, cached); steam/book are local validation.
  gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev,bench]"
      - name: Cache MovieLens-1M
        uses: actions/cache@v4
        with:
          path: ~/.cache/kindling
          key: movielens-1m-v1
      - name: NDCG regression gate (movielens-1m)
        run: python bench/check_gate.py

  # Build distributable wheels (abi3-py311: one wheel per platform covers
  # py3.11+) so a release actually ships a working engine.
  wheels:
    name: wheel-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
          - { runner: macos-13, target: x86_64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - name: Smoke-test the built wheel
        shell: bash
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install --find-links dist --no-index kindling-rec || \
            /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/python -c "import kindling, pandas as pd; from kindling._native import CORE_AVAILABLE; assert CORE_AVAILABLE; e=kindling.Engine(); print('wheel OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist
