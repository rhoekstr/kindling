name: Release

# Triggered by a version tag (e.g. v1.0.0).
# Builds per-platform abi3 wheels + an sdist, then publishes to PyPI via
# Trusted Publishing (OIDC — no stored API token needed).
#
# Before this workflow can publish you must configure the trusted publisher
# on PyPI once (see docs/RELEASING.md for the steps).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── per-platform wheel builds ─────────────────────────────────────────────
  wheels:
    name: wheel / ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64,   label: linux-x86_64  }
          - { runner: macos-14,       target: aarch64,  label: macos-arm64   }
          - { runner: windows-latest, target: x86_64,   label: windows-x86_64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto   # produces manylinux_2_17 on Linux; noop elsewhere

      - name: Smoke-test wheel
        shell: bash
        run: |
          pip install --find-links dist --no-index kindling-rec || \
            pip install dist/*.whl
          python -c "
          import kindling, pandas as pd
          from kindling._native import CORE_AVAILABLE
          assert CORE_AVAILABLE, 'Rust core not loaded'
          e = kindling.Engine()
          print(f'wheel OK  kindling=={kindling.__version__}')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.label }}
          path: dist

  # ── source distribution ───────────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ── publish to PyPI ───────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kindling-rec
    permissions:
      id-token: write   # required for OIDC Trusted Publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
